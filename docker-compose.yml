version: "3"

services:
  payload:
    image: node:20-alpine
    ports:
      - "3002:3002"
    volumes:
      - .:/home/node/app
      - node_modules:/home/node/app/node_modules
    working_dir: /home/node/app/
    command: sh -c "corepack enable && pnpm install && pnpm exec next dev --webpack --hostname 0.0.0.0 --port 3002"
    depends_on:
      - mongo
      # - postgres
    env_file:
      - .env
    environment:
      DATABASE_URL: mongodb://mongo:27017/test-payload
      NEXT_PUBLIC_SERVER_URL: http://localhost:3002

  # Ensure your DATABASE_URL uses 'mongo' as the hostname ie. mongodb://mongo/my-db-name
  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    command:
      - --storageEngine=wiredTiger
    volumes:
      - data:/data/db
    logging:
      driver: none

  # Uncomment the following to use postgres
  # postgres:
  #   restart: always
  #   image: postgres:latest
  #   volumes:
  #     - pgdata:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"

volumes:
  data:
  # pgdata:
  node_modules:
